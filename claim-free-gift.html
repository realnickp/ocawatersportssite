<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" type="image/png" href="/images/OCA_LogoColors-final.png" />
  <link rel="apple-touch-icon" href="/images/OCA_LogoColors-final.png" />
  <title>Claim My Free Gift | OCA Watersports</title>

  <!-- Keep this page out of every index and AI crawler -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate, max-snippet:0, max-image-preview:none, max-video-preview:0" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="GPTBot" content="noindex, nofollow" />
  <meta name="ChatGPT-User" content="noindex, nofollow" />
  <meta name="OAI-SearchBot" content="noindex, nofollow" />
  <meta name="ClaudeBot" content="noindex, nofollow" />
  <meta name="PerplexityBot" content="noindex, nofollow" />
  <meta name="Google-Extended" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --color-navy: #021922;
      --color-navy-mid: #122227;
      --color-teal: #28484e;
      --color-gold: #debc6b;
      --color-gold-bright: #ffa600;
      --color-white: #fff;
      --color-light: #ececec;
      --font-display: "Audiowide", cursive;
      --font-body: "Manrope", system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: var(--font-body);
      color: var(--color-white);
      background: var(--color-navy);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(ellipse at top, rgba(222, 188, 107, 0.18), transparent 60%),
        radial-gradient(ellipse at bottom left, rgba(17, 178, 197, 0.12), transparent 55%),
        linear-gradient(180deg, var(--color-navy) 0%, var(--color-navy-mid) 100%);
    }

    .wrap {
      flex: 1;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 140px;
      height: auto;
      margin-bottom: 1.5rem;
    }

    .eyebrow {
      display: inline-block;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-gold);
      background: rgba(222, 188, 107, 0.1);
      border: 1px solid rgba(222, 188, 107, 0.35);
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5.5vw, 3.25rem);
      line-height: 1.1;
      text-align: center;
      margin: 0 0 0.75rem;
      color: var(--color-white);
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
    }

    h1 .accent {
      color: var(--color-gold);
    }

    .sub {
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.125rem);
      line-height: 1.5;
      color: var(--color-light);
      max-width: 540px;
      margin: 0 0 2rem;
    }

    .card {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(222, 188, 107, 0.25);
      border-radius: 20px;
      padding: 1.25rem;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .form-shell {
      background: var(--color-white);
      border-radius: 12px;
      overflow: hidden;
      min-height: 620px;
    }

    .form-shell iframe {
      width: 100%;
      min-height: 620px;
      border: none;
      border-radius: 8px;
      display: block;
    }

    .trust {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      color: var(--color-light);
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .trust span::before {
      content: "✓";
      color: var(--color-gold);
      font-weight: 700;
      margin-right: 0.4rem;
    }

    footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.75rem;
      color: rgba(236, 236, 236, 0.5);
    }

    @media (max-width: 480px) {
      .wrap { padding: 1.5rem 1rem 2rem; }
      .logo { width: 110px; }
      .card { padding: 0.75rem; border-radius: 16px; }
      .form-shell, .form-shell iframe { min-height: 680px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="/images/OCA_LogoWhite-final.png" alt="OCA Watersports" class="logo" />

    <h1>Get <span class="accent">Exclusive Access</span> to Deals &amp; Discounts</h1>

    <p class="sub">Sign up through the form below.</p>

    <div class="card">
      <div class="form-shell">
        <iframe
          src="https://links.legacylinqdigital.com/widget/form/IOQA3uIEKucRBAP0kD7B"
          style="width:100%;height:100%;border:none;border-radius:8px"
          id="inline-IOQA3uIEKucRBAP0kD7B"
          data-layout="{'id':'INLINE'}"
          data-trigger-type="alwaysShow"
          data-trigger-value=""
          data-activation-type="alwaysActivated"
          data-activation-value=""
          data-deactivation-type="neverDeactivate"
          data-deactivation-value=""
          data-form-name="Form 3"
          data-height="604"
          data-layout-iframe-id="inline-IOQA3uIEKucRBAP0kD7B"
          data-form-id="IOQA3uIEKucRBAP0kD7B"
          title="Form 3">
        </iframe>
      </div>
    </div>

  </main>

  <footer>
    &copy; OCA Watersports &middot; 12817 Harbor Rd, Ocean City, MD 21842
  </footer>

  <script src="https://links.legacylinqdigital.com/js/form_embed.js"></script>
</body>
</html>
