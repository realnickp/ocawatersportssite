<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" type="image/png" href="/images/OCA_LogoColors-final.png" />
  <link rel="apple-touch-icon" href="/images/OCA_LogoColors-final.png" />
  <title>Exclusive Deals &amp; Discounts | OCA Watersports</title>

  <!-- Keep this page out of every index and AI crawler -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate, max-snippet:0, max-image-preview:none, max-video-preview:0" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="GPTBot" content="noindex, nofollow" />
  <meta name="ChatGPT-User" content="noindex, nofollow" />
  <meta name="OAI-SearchBot" content="noindex, nofollow" />
  <meta name="ClaudeBot" content="noindex, nofollow" />
  <meta name="PerplexityBot" content="noindex, nofollow" />
  <meta name="Google-Extended" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Encode+Sans+Expanded:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="interior.css" />

  <style>
    body {
      background:
        radial-gradient(ellipse at top, rgba(222, 188, 107, 0.18), transparent 60%),
        radial-gradient(ellipse at bottom left, rgba(17, 178, 197, 0.12), transparent 55%),
        linear-gradient(180deg, var(--color-navy) 0%, var(--color-navy-mid) 100%);
      color: var(--color-white);
      min-height: 100vh;
    }

    .claim-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .claim-wrap {
      flex: 1;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: clamp(9rem, 20vw, 11rem) 1.25rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .claim-h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5.5vw, 3.25rem);
      line-height: 1.1;
      text-align: center;
      margin: 0 0 0.75rem;
      color: var(--color-white);
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
    }

    .claim-h1 .accent {
      color: var(--color-gold);
    }

    .claim-sub {
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.125rem);
      line-height: 1.5;
      color: var(--color-light);
      max-width: 540px;
      margin: 0 0 2rem;
    }

    .claim-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(222, 188, 107, 0.25);
      border-radius: 20px;
      padding: 1.25rem;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .form-shell {
      background: var(--color-white);
      border-radius: 12px;
      overflow: hidden;
      min-height: 620px;
    }

    .form-shell iframe {
      width: 100%;
      min-height: 620px;
      border: none;
      border-radius: 8px;
      display: block;
    }

    .claim-footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 0.75rem;
      color: rgba(236, 236, 236, 0.5);
    }

    @media (max-width: 480px) {
      .claim-wrap { padding: 9rem 1rem 2rem; }
      .claim-card { padding: 0.75rem; border-radius: 16px; }
      .form-shell, .form-shell iframe { min-height: 680px; }
    }
  </style>
</head>
<body>
<div class="page-int claim-page">

  <!-- Nav -->
  <nav class="nav-int scrolled" id="navInt" aria-label="Primary navigation">
    <a class="nav-int__logo" href="/">
      <img class="logo-white" src="images/OCA_LogoWhite-final.png" alt="OCA Watersports" width="120" height="78" />
      <img class="logo-color" src="images/OCA_LogoColors-final.png" alt="OCA Watersports" width="120" height="78" />
    </a>
    <button class="nav-int__hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-int__links" id="navLinks">
      <li><a href="/">Home</a></li>
      <li><a href="/jet-skis">Jet Skis</a></li>
      <li><a href="/pontoon-boats">Pontoon Boats</a></li>
      <li><a href="/the-6-mile-ride">The 6 Mile Ride</a></li>
      <!-- HIDE:IMAP_LAUNCH_MAY --><!-- <li><a href="/interactive-map">Interactive Map</a></li> -->
      <li><a href="/about">About</a></li>
      <li><a href="/deals">Deals &amp; Coupons</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
    <a class="btn btn--gold nav-int__cta" href="https://fareharbor.com/embeds/book/underthebridgewatersports/?full-items=yes">BOOK NOW</a>
  </nav>

  <main class="claim-wrap">
    <h1 class="claim-h1">Get <span class="accent">Exclusive Access</span> to Deals &amp; Discounts</h1>

    <p class="claim-sub">Sign up through the form below.</p>

    <div class="claim-card">
      <div class="form-shell">
        <iframe
          src="https://links.legacylinqdigital.com/widget/form/IOQA3uIEKucRBAP0kD7B"
          style="width:100%;height:100%;border:none;border-radius:8px"
          id="inline-IOQA3uIEKucRBAP0kD7B"
          data-layout="{'id':'INLINE'}"
          data-trigger-type="alwaysShow"
          data-trigger-value=""
          data-activation-type="alwaysActivated"
          data-activation-value=""
          data-deactivation-type="neverDeactivate"
          data-deactivation-value=""
          data-form-name="Form 3"
          data-height="604"
          data-layout-iframe-id="inline-IOQA3uIEKucRBAP0kD7B"
          data-form-id="IOQA3uIEKucRBAP0kD7B"
          title="Form 3">
        </iframe>
      </div>
    </div>
  </main>

  <footer class="claim-footer">
    &copy; OCA Watersports &middot; 12817 Harbor Rd, Ocean City, MD 21842
  </footer>

</div>

<script>
(function () {
  'use strict';
  var hamburger = document.getElementById('hamburger');
  var navLinks = document.getElementById('navLinks');

  if (hamburger) {
    hamburger.addEventListener('click', function () {
      var open = hamburger.getAttribute('aria-expanded') === 'true';
      hamburger.setAttribute('aria-expanded', String(!open));
      hamburger.classList.toggle('open', !open);
      navLinks.classList.toggle('open', !open);
    });
    navLinks.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', function () {
        hamburger.setAttribute('aria-expanded', 'false');
        hamburger.classList.remove('open');
        navLinks.classList.remove('open');
      });
    });
  }
}());
</script>

<script src="https://links.legacylinqdigital.com/js/form_embed.js"></script>
</body>
</html>
