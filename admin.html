<body>

  <!-- ======================================================
       LOGIN GATE
       ====================================================== -->
  <div class="admin-login" id="loginGate">
    <div class="admin-login__box">
      <img class="admin-login__logo" src="images/OCA_LogoWhite-final.png" alt="OCA Watersports" />
      <h1 class="admin-login__title">ADMIN</h1>
      <p class="admin-login__sub">Enter the admin password to continue.</p>
      <form class="admin-login__form" id="loginForm">
        <input
          class="admin-login__input"
          id="passwordInput"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
          required
        />
        <button class="admin-login__btn" type="submit">LOG IN</button>
        <p class="admin-login__error" id="loginError" style="display:none;">Incorrect password. Try again.</p>
      </form>
    </div>
  </div>

  <!-- ======================================================
       DASHBOARD (hidden until login)
       ====================================================== -->
  <div class="admin-dash" id="dashboard" style="display:none;">

    <!-- Sticky header -->
    <header class="admin-header">
      <img class="admin-header__logo" src="images/OCA_LogoWhite-final.png" alt="OCA Watersports" />
      <div class="admin-header__right">
        <span class="admin-header__label">Admin</span>
        <button class="admin-header__logout" id="logoutBtn">Log Out</button>
      </div>
    </header>

    <!-- Tabs -->
    <div class="admin-tabs" role="tablist">
      <button class="admin-tab active" id="tab-text" role="tab" aria-controls="panel-text" aria-selected="true">Edit Text</button>
      <button class="admin-tab" id="tab-coupons" role="tab" aria-controls="panel-coupons" aria-selected="false">Manage Coupons</button>
    </div>

    <!-- Panel: Edit Text -->
    <div class="admin-panel active admin-panel--split" id="panel-text" role="tabpanel" aria-labelledby="tab-text">
      <div class="admin-editor-pane">
        <p class="admin-panel__helper">Edit text and save. The preview refreshes automatically.</p>
        <div class="admin-page-nav" id="pageNav"></div>
        <div id="textFieldsContainer"></div>
      </div>
      <div class="admin-preview-pane" id="previewPane">
        <div class="admin-preview-bar">
          <span class="admin-preview-bar__label">Live Preview</span>
          <button class="admin-preview-bar__refresh" id="previewRefreshBtn" title="Refresh preview">&#8635;</button>
        </div>
        <iframe class="admin-preview-frame" id="previewFrame" src="index.html"></iframe>
      </div>
    </div>

    function baseHeaders() {
      return {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json'
      };
    }

    function rpc(fn, params) {
      return fetch(SUPABASE_URL + '/rest/v1/rpc/' + fn, {
        method: 'POST',
        headers: baseHeaders(),
        body: JSON.stringify(params || {})
      }).then(function (res) {
        if (!res.ok) { throw new Error('RPC ' + fn + ' failed: ' + res.status); }
        return res.json();
      });
    }

    function supaGet(table, query) {
      var url = SUPABASE_URL + '/rest/v1/' + table;
      if (query) { url += query; }
      return fetch(url, {
        method: 'GET',
        headers: baseHeaders()
      }).then(function (res) {
        if (!res.ok) { throw new Error('GET ' + table + ' failed: ' + res.status); }
        return res.json();
      });

    function doLogin(pw) {
      supaGet('admin_settings', '?select=value&key=eq.admin_password').then(function (rows) {

          sessionStorage.setItem('oca_admin', pw);
          loginError.style.display = 'none';
          showDashboard(pw);
        } else {
          loginError.style.display = 'block';
        }
      }).catch(function () {
        loginError.style.display = 'block';
      });
    }

    loginForm.addEventListener('submit', function (e) {
      e.preventDefault();
      var pw = passwordInput.value;
      if (!pw) { return; }
      doLogin(pw);
    });

      loginGate.style.display = 'flex';

      tabCoupons.setAttribute('aria-selected', 'false');

      panelCoupons.classList.remove('active');

      tabEl.setAttribute('aria-selected', 'true');
      panelEl.classList.add('active');

      activateTab(tabText, panelText);

    /* ─── Text Fields ────────────────────────────────────────────── */
    function loadTextFields() {
      textFieldsContainer.innerHTML = '<p style="color:rgba(255,255,255,0.4);font-size:.875rem;">Loading fields...</p>';

      supaGet('site_content', '?select=id,content').then(function (rows) {
        var map = {};
        for (var i = 0; i < rows.length; i++) {
          map[rows[i].id] = rows[i].content;
        }
        renderTextFields(map);
      }).catch(function () {
        renderTextFields({});
      });
    }

    function escHtml(str) {
      var div = document.createElement('div');
      div.textContent = String(str || '');
      return div.innerHTML;
    }

    function renderTextFields(map) {
      /* Group by page */
      var pages = [];
      var pageMap = {};
      for (var i = 0; i < FIELDS.length; i++) {
        var f = FIELDS[i];
        if (!pageMap[f.page]) {
          pageMap[f.page] = [];
          pages.push(f.page);
        }
        pageMap[f.page].push(f);
      }

      /* Build page nav buttons */
      var navHtml = '';
      for (var n = 0; n < pages.length; n++) {
        var activeClass = n === 0 ? ' active' : '';
        navHtml += '<button class="admin-page-nav__btn' + activeClass + '" data-page="' + escHtml(pages[n]) + '">' + escHtml(pages[n]) + '</button>';
      }
      document.getElementById('pageNav').innerHTML = navHtml;

      /* Build field groups — only first page visible initially */
      var html = '';
      for (var p = 0; p < pages.length; p++) {
        var pageName = pages[p];
        var fields = pageMap[pageName];
        var visClass = p === 0 ? ' visible' : '';
        var slug = pageName.toLowerCase().replace(/\s+/g, '-');
        html += '<div class="admin-page-group' + visClass + '" data-page-group="' + escHtml(pageName) + '">';
        html += '<h2 class="admin-page-group__title">' + escHtml(pageName) + '</h2>';
        for (var j = 0; j < fields.length; j++) {
          var field = fields[j];
          var val = map[field.id] !== undefined ? map[field.id] : '';
          html += '<div class="admin-field">';
          html += '<label class="admin-field__label" for="field-' + escHtml(field.id) + '">' + escHtml(field.label) + '</label>';
          if (field.type === 'textarea') {
            html += '<textarea class="admin-field__textarea" id="field-' + escHtml(field.id) + '" data-field-id="' + escHtml(field.id) + '">' + escHtml(val) + '</textarea>';
          } else {
            html += '<input class="admin-field__input" type="text" id="field-' + escHtml(field.id) + '" data-field-id="' + escHtml(field.id) + '" value="' + escHtml(val) + '" />';
          }
          html += '</div>';
        }
        html += '<div class="admin-page-group__footer">';
        html += '<button class="admin-save-btn" data-save-page="' + escHtml(pageName) + '">SAVE ' + escHtml(pageName).toUpperCase() + '</button>';
        html += '<span class="admin-status" data-status-page="' + escHtml(pageName) + '"></span>';
        html += '</div>';
        html += '</div>';
      }

      textFieldsContainer.innerHTML = html;

      /* Page → URL mapping for preview iframe */
      var PAGE_URLS = {
        'Home': 'index.html',
        'Jet Skis': 'jet-skis.html',
        'Pontoon Boats': 'pontoon-boats.html',
        'The 6 Mile Ride': 'the-6-mile-ride.html',
        'About': 'about.html',
        'Contact': 'contact.html',
        'Deals': 'deals.html'
      };
      var previewFrame = document.getElementById('previewFrame');
      var previewRefreshBtn = document.getElementById('previewRefreshBtn');

      /* Refresh preview helper */
      function refreshPreview() {
        if (previewFrame) {
          previewFrame.src = previewFrame.src;
        }
      }

      if (previewRefreshBtn) {
        previewRefreshBtn.addEventListener('click', refreshPreview);
      }

      /* Page nav click handlers */
      var navBtns = document.querySelectorAll('.admin-page-nav__btn');
      var groups = document.querySelectorAll('.admin-page-group');
      for (var nb = 0; nb < navBtns.length; nb++) {
        (function (btn) {
          btn.addEventListener('click', function () {
            for (var x = 0; x < navBtns.length; x++) { navBtns[x].classList.remove('active'); }
            for (var y = 0; y < groups.length; y++) { groups[y].classList.remove('visible'); }
            btn.classList.add('active');
            var pageName = btn.getAttribute('data-page');
            var target = document.querySelector('[data-page-group="' + pageName + '"]');
            if (target) { target.classList.add('visible'); }
            /* Switch preview iframe to matching page */
            if (previewFrame && PAGE_URLS[pageName]) {
              previewFrame.src = PAGE_URLS[pageName];
            }
          });
        }(navBtns[nb]));
      }

      /* Per-page save button handlers */
      var saveBtns = document.querySelectorAll('[data-save-page]');
      for (var sb = 0; sb < saveBtns.length; sb++) {
        (function (btn) {
          btn.addEventListener('click', function () {
            savePageFields(btn.getAttribute('data-save-page'));
          });
        }(saveBtns[sb]));
      }

      /* Live preview — send changes to iframe as user types */
      var allFields = textFieldsContainer.querySelectorAll('[data-field-id]');
      for (var lf = 0; lf < allFields.length; lf++) {
        (function (field) {
          field.addEventListener('input', function () {
            if (previewFrame && previewFrame.contentWindow) {
              previewFrame.contentWindow.postMessage({
                cmsKey: field.getAttribute('data-field-id'),
                cmsValue: field.value
              }, '*');
            }
          });
        }(allFields[lf]));
      }
    }

    function savePageFields(pageName) {
      var group = document.querySelector('[data-page-group="' + pageName + '"]');
      if (!group) { return; }
      var inputs = group.querySelectorAll('[data-field-id]');
      var statusEl = group.querySelector('[data-status-page="' + pageName + '"]');
      var btn = group.querySelector('[data-save-page="' + pageName + '"]');
      var total = inputs.length;
      var done = 0;
      var errors = 0;

      if (!total) { return; }

      btn.disabled = true;
      btn.textContent = 'SAVING...';
      statusEl.className = 'admin-status visible';
      statusEl.textContent = '';

      function finish() {
        btn.disabled = false;
        btn.textContent = 'SAVE ' + pageName.toUpperCase();
        if (errors > 0) {
          statusEl.className = 'admin-status visible admin-status--error';
          statusEl.textContent = 'Saved with ' + errors + ' error(s).';
        } else {
          statusEl.className = 'admin-status visible admin-status--success';
          statusEl.textContent = 'Saved!';
          /* Auto-refresh the preview iframe after successful save */
          setTimeout(refreshPreview, 300);
        }
        setTimeout(function () {
          statusEl.className = 'admin-status';
          statusEl.textContent = '';
        }, 3500);
      }

      for (var i = 0; i < inputs.length; i++) {
        (function (el) {
          var key = el.getAttribute('data-field-id');
          var value = el.value;
          rpc('update_content', { p_id: key, p_content: value, p_password: adminPassword })
            .then(function () {
              done++;
              if (done === total) { finish(); }
            })
            .catch(function () {
              errors++;
              done++;
              if (done === total) { finish(); }
            });
        }(inputs[i]));
      }
    }

        couponListContainer.innerHTML = '<p style="color:rgba(255,255,255,0.4);font-size:.875rem;">No coupons yet. Add one above.</p>';

        html += '<span class="admin-coupon-card__category">' + escHtml(c.category || '') + '</span>';

            showCouponForm(coupon);

      for (var d = 0; d < deleteBtns.length; d++) {
        (function (btn) {
          btn.addEventListener('click', function () {
            var id = btn.getAttribute('data-coupon-id');
            if (!confirm('Delete this coupon? This cannot be undone.')) { return; }
            rpc('delete_coupon', { p_id: id, p_password: adminPassword })
              .then(function () { loadCouponList(); })
              .catch(function () { alert('Failed to delete coupon.'); });
          });
        }(deleteBtns[d]));
      }
    }

    function saveCoupon(existingId) {
      var statusEl = document.getElementById('couponStatus');
      var category   = document.getElementById('cf-category').value;
      var code       = document.getElementById('cf-code').value.trim();
      var typeLabel  = document.getElementById('cf-type-label').value.trim();
      var offer      = document.getElementById('cf-offer').value.trim();
      var detail     = document.getElementById('cf-detail').value.trim();

      if (!typeLabel) {
        statusEl.className = 'admin-coupon-status visible admin-coupon-status--error';
        statusEl.textContent = 'Type Label is required.';
        return;
      }

      statusEl.className = 'admin-coupon-status visible';
      statusEl.textContent = 'Saving...';

      var params = {
        p_password:  adminPassword,
        p_category:  category,
        p_code:      code || null,
        p_type_label: typeLabel,
        p_offer:     offer || null,
        p_detail:    detail || null,
        p_active:    true
      };

      params.p_id = existingId || null;

      rpc('upsert_coupon', params).then(function () {
        statusEl.className = 'admin-coupon-status visible admin-coupon-status--success';
        statusEl.textContent = 'Saved!';
        setTimeout(function () {
          couponFormContainer.style.display = 'none';
          couponFormContainer.innerHTML = '';
          loadCouponList();
        }, 800);
      }).catch(function () {
        statusEl.className = 'admin-coupon-status visible admin-coupon-status--error';
        statusEl.textContent = 'Save failed. Check console.';
      });
    }

    /* ─── Add coupon button ──────────────────────────────────────── */
    addCouponBtn.addEventListener('click', function () {
      showCouponForm(null);
    });

  }());
  </script>

</body>
</html>
